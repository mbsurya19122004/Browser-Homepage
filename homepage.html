<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="icon" href="icons8-home-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --glass: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.22);
    --glass-strong: rgba(255,255,255,0.16);
    --text: #f5f6f7;
    --text-dim: rgba(245,246,247,0.62);
    --accent: #ffb454;
    --danger: #ff5c5c;
    --radius: 18px;
    --blur: 22px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%; width:100%;
    font-family:'Inter', -apple-system, system-ui, sans-serif;
    overflow:hidden;
  }

  body{
    color: var(--text);
    background: #0e0f11;
  }

  /* ---------- Background layer ---------- */
  #bg-layer{
    position:fixed; inset:0; z-index:0;
    background: radial-gradient(ellipse at top, #1c2027 0%, #0b0c0e 70%);
  }
  #bg-image, #bg-video{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:none;
  }
  #bg-overlay{
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.18) 40%, rgba(0,0,0,0.40) 100%);
    pointer-events:none;
  }

  /* ---------- Main layout ---------- */
  #stage{
    position:relative; z-index:1;
    height:100vh; width:100vw;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 6vh 5vw;
    gap: 6vh;
  }

  /* ---------- Clock ---------- */
  #clock-wrap{
    text-align:center;
    user-select:none;
  }
  #clock{
    font-family:'Space Grotesk', sans-serif;
    font-weight:300;
    font-size: clamp(56px, 11vw, 132px);
    letter-spacing: 0.01em;
    line-height:1;
    text-shadow: 0 2px 30px rgba(0,0,0,0.35);
    font-variant-numeric: tabular-nums;
  }
  #clock .secs{
    font-size: 0.38em;
    color: var(--text-dim);
    vertical-align: 0.42em;
    margin-left: 6px;
  }
  #date{
    margin-top: 10px;
    font-size: clamp(13px, 1.6vw, 17px);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ---------- Search ---------- */
  #search-form{
    width: min(560px, 88vw);
  }
  #search-box{
    display:flex; align-items:center; gap:12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-radius: 999px;
    padding: 14px 20px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  #search-box:focus-within{
    background: var(--glass-strong);
    border-color: rgba(255,255,255,0.34);
  }
  #search-box svg{ flex-shrink:0; opacity:0.7; }
  #search-input{
    flex:1; background:none; border:none; outline:none;
    color: var(--text); font-size:15px; font-family:'Inter', sans-serif;
  }
  #search-input::placeholder{ color: var(--text-dim); }

  /* ---------- Shortcuts ---------- */
  #shortcuts{
    display:flex; flex-wrap:wrap; justify-content:center;
    gap: 22px 20px;
    width: min(680px, 92vw);
  }
  .tile{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    gap:8px; width: 76px;
    cursor:pointer;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .tile .icon-box{
    width:56px; height:56px; border-radius:16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    display:flex; align-items:center; justify-content:center;
    transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    overflow:hidden;
  }
  .tile:hover .icon-box{
    background: var(--glass-strong);
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.34);
  }
  .tile .icon-box img{ width:28px; height:28px; border-radius:6px; }
  .tile .fallback-letter{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px; font-weight:500; color: var(--text);
  }
  .tile .label{
    font-size:12px; color: var(--text-dim);
    max-width: 76px; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .tile .remove-btn, .tile .edit-btn{
    position:absolute; top:-6px;
    width:20px; height:20px; border-radius:50%;
    color:#fff;
    display:none; align-items:center; justify-content:center;
    font-size:11px; line-height:1; border:2px solid #0e0f11;
    cursor:pointer; z-index:2;
  }
  .tile .remove-btn{ right:8px; background: var(--danger); }
  .tile .edit-btn{ left:8px; background: #4d84ff; font-size:12px; }
  .tile:hover .remove-btn, .tile:hover .edit-btn{ display:flex; }
  .tile.dragging{ opacity:0.4; }

  .tile.add-tile .icon-box{
    border-style:dashed;
    background: rgba(255,255,255,0.04);
  }
  .tile.add-tile .icon-box svg{ opacity:0.75; }
  .tile.add-tile .label{ opacity:0.75; }

  /* ---------- Bottom-right controls ---------- */
  #controls{
    position:fixed; bottom:22px; right:22px; z-index:3;
    display:flex; gap:10px;
  }
  .ctrl-btn{
    width:42px; height:42px; border-radius:50%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    display:flex; align-items:center; justify-content:center;
    color: var(--text); cursor:pointer;
    transition: background 0.18s ease, transform 0.18s ease;
  }
  .ctrl-btn:hover{ background: var(--glass-strong); transform: translateY(-2px); }

  /* ---------- Modal ---------- */
  #modal-overlay{
    position:fixed; inset:0; z-index:10;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    display:none; align-items:center; justify-content:center;
  }
  #modal-overlay.open{ display:flex; }
  .modal{
    width: min(360px, 88vw);
    background: rgba(28,30,34,0.86);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .modal h3{
    margin:0 0 18px; font-family:'Space Grotesk', sans-serif;
    font-weight:500; font-size:19px;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; color: var(--text-dim);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;
  }
  .field input{
    width:100%; padding:11px 13px; border-radius:10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text); font-size:14px; outline:none;
    font-family:'Inter', sans-serif;
  }
  .field input:focus{ border-color: var(--accent); }
  .icon-upload-row{
    display:flex; align-items:center; gap:12px;
  }
  .icon-preview{
    width:44px; height:44px; border-radius:12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; flex-shrink:0;
  }
  .icon-preview img{ width:26px; height:26px; border-radius:6px; }
  .icon-preview svg{ opacity:0.5; }
  .icon-upload-buttons{
    display:flex; flex-direction:column; gap:6px; flex:1;
  }
  .link-btn{
    background:none; border:none; color: var(--text-dim);
    font-size:12px; text-align:left; cursor:pointer; padding:0;
    font-family:'Inter', sans-serif; text-decoration:underline;
  }
  .link-btn:hover{ color: var(--text); }
  .upload-icon-btn{
    background: rgba(255,255,255,0.08); color: var(--text);
    border:1px solid var(--glass-border); border-radius:8px;
    padding:8px 12px; font-size:13px; cursor:pointer; text-align:left;
    font-family:'Inter', sans-serif;
  }
  .upload-icon-btn:hover{ background: rgba(255,255,255,0.14); }
  .modal-actions{
    display:flex; gap:10px; margin-top:20px;
  }
  .btn{
    flex:1; padding:11px; border-radius:10px; border:none;
    font-size:14px; font-weight:500; cursor:pointer;
    font-family:'Inter', sans-serif;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--accent); color:#1a1305; }
  .btn-secondary{ background: rgba(255,255,255,0.08); color: var(--text); }
  .btn:hover{ opacity:0.9; }

  #file-input, #bg-file-input{ display:none; }

  #hint{
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    z-index:20; background: rgba(20,20,22,0.85);
    border:1px solid var(--glass-border); border-radius:10px;
    padding:9px 16px; font-size:13px; color: var(--text);
    opacity:0; pointer-events:none; transition: opacity 0.3s ease;
  }
  #hint.show{ opacity:1; }
</style>
</head>
<body>

<div id="bg-layer">
  <img id="bg-image" alt="">
  <video id="bg-video" autoplay muted loop playsinline></video>
  <div id="bg-overlay"></div>
</div>

<div id="hint"></div>

<div id="stage">
  <div id="clock-wrap">
    <div id="clock">00:00<span class="secs">00</span></div>
    <div id="date">—</div>
  </div>

  <form id="search-form">
    <div id="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search the web" autocomplete="off">
    </div>
  </form>

  <div id="shortcuts"></div>
</div>

<div id="controls">
  <div class="ctrl-btn" id="bg-btn" title="Change background">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
  </div>
  <div class="ctrl-btn" id="bg-clear-btn" title="Remove background">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
  </div>
</div>

<input type="file" id="bg-file-input" accept="image/*,video/*">

<div id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add shortcut</h3>
    <div class="field">
      <label>Website URL</label>
      <input id="input-url" type="text" placeholder="youtube.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Name (optional)</label>
      <input id="input-name" type="text" placeholder="YouTube" autocomplete="off">
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="icon-upload-row">
        <div class="icon-preview" id="icon-preview">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="icon-upload-buttons">
          <button type="button" class="upload-icon-btn" id="upload-icon-btn">Upload custom icon</button>
          <button type="button" class="link-btn" id="use-default-icon-btn" style="display:none;">Use site's default icon instead</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Add</button>
    </div>
  </div>
</div>

<input type="file" id="icon-file-input" accept="image/*">

<script>
(function(){
  const STORAGE_KEY = 'homepage.shortcuts.v1';
  const BG_KEY = 'homepage.background.v1';

  const shortcutsEl = document.getElementById('shortcuts');
  const modalOverlay = document.getElementById('modal-overlay');
  const modalTitle = document.getElementById('modal-title');
  const inputUrl = document.getElementById('input-url');
  const inputName = document.getElementById('input-name');
  const bgImage = document.getElementById('bg-image');
  const bgVideo = document.getElementById('bg-video');
  const hint = document.getElementById('hint');
  const iconPreview = document.getElementById('icon-preview');
  const iconFileInput = document.getElementById('icon-file-input');
  const uploadIconBtn = document.getElementById('upload-icon-btn');
  const useDefaultIconBtn = document.getElementById('use-default-icon-btn');
  const saveBtn = document.getElementById('save-btn');

  let shortcuts = [];
  let dragSrcId = null;
  let editingId = null;      // null = adding new, otherwise id of shortcut being edited
  let customIconData = null; // base64 data URL of uploaded custom icon, or null

  // ---------- Defaults ----------
  const defaultShortcuts = [
    { id: 'd1', url: 'https://youtube.com', name: 'YouTube' },
    { id: 'd2', url: 'https://github.com', name: 'GitHub' },
    { id: 'd3', url: 'https://mail.google.com', name: 'Gmail' }
  ];

  // ---------- Storage ----------
  function loadShortcuts(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      shortcuts = raw ? JSON.parse(raw) : defaultShortcuts.slice();
    }catch(e){
      shortcuts = defaultShortcuts.slice();
    }
  }
  function saveShortcuts(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(shortcuts)); }
    catch(e){ showHint('Could not save shortcuts'); }
  }

  function loadBackground(){
    try{
      const raw = localStorage.getItem(BG_KEY);
      if(!raw) return;
      const data = JSON.parse(raw);
      applyBackground(data.type, data.src, false);
    }catch(e){ /* ignore */ }
  }
  function saveBackground(type, src){
    try{
      localStorage.setItem(BG_KEY, JSON.stringify({ type, src }));
    }catch(e){
      showHint('Background too large to save — it will reset next time');
    }
  }
  function clearBackgroundStorage(){
    try{ localStorage.removeItem(BG_KEY); }catch(e){}
  }

  function showHint(msg){
    hint.textContent = msg;
    hint.classList.add('show');
    clearTimeout(showHint._t);
    showHint._t = setTimeout(()=> hint.classList.remove('show'), 2400);
  }

  // ---------- Background ----------
  function applyBackground(type, src, persist){
    if(type === 'image'){
      bgVideo.pause();
      bgVideo.style.display = 'none';
      bgVideo.removeAttribute('src');
      bgImage.src = src;
      bgImage.style.display = 'block';
    } else if(type === 'video'){
      bgImage.style.display = 'none';
      bgImage.removeAttribute('src');
      bgVideo.src = src;
      bgVideo.style.display = 'block';
      bgVideo.play().catch(()=>{});
    }
    if(persist) saveBackground(type, src);
  }

  function clearBackground(){
    bgImage.style.display = 'none';
    bgImage.removeAttribute('src');
    bgVideo.pause();
    bgVideo.style.display = 'none';
    bgVideo.removeAttribute('src');
    clearBackgroundStorage();
    showHint('Background removed');
  }

  document.getElementById('bg-btn').addEventListener('click', ()=>{
    document.getElementById('bg-file-input').click();
  });
  document.getElementById('bg-clear-btn').addEventListener('click', clearBackground);

  document.getElementById('bg-file-input').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const isVideo = file.type.startsWith('video/');
    const isImage = file.type.startsWith('image/');
    if(!isVideo && !isImage){ showHint('Unsupported file type'); return; }

    const reader = new FileReader();
    reader.onload = function(ev){
      applyBackground(isVideo ? 'video' : 'image', ev.target.result, true);
    };
    reader.onerror = function(){ showHint('Could not read file'); };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // ---------- Clock ----------
  function pad(n){ return n.toString().padStart(2, '0'); }
  function tickClock(){
    const now = new Date();
    let h = now.getHours();
    const m = pad(now.getMinutes());
    const s = pad(now.getSeconds());
    document.getElementById('clock').innerHTML = pad(h) + ':' + m + '<span class="secs">' + s + '</span>';
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------- Shortcuts rendering ----------
  function normalizeUrl(raw){
    let u = raw.trim();
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }
  function getHostname(url){
    try{ return new URL(url).hostname.replace(/^www\./, ''); }
    catch(e){ return url; }
  }
  function faviconUrl(hostname){
    return 'https://www.google.com/s2/favicons?sz=128&domain=' + encodeURIComponent(hostname);
  }

  function renderShortcuts(){
    shortcutsEl.innerHTML = '';
    shortcuts.forEach(sc => {
      const hostname = getHostname(sc.url);
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.draggable = true;
      tile.dataset.id = sc.id;

      const iconBox = document.createElement('div');
      iconBox.className = 'icon-box';
      const img = document.createElement('img');
      img.src = sc.icon || faviconUrl(hostname);
      img.alt = '';
      img.onerror = function(){
        iconBox.innerHTML = '';
        const letter = document.createElement('div');
        letter.className = 'fallback-letter';
        letter.textContent = (sc.name || hostname).charAt(0).toUpperCase();
        iconBox.appendChild(letter);
      };
      iconBox.appendChild(img);

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = sc.name || hostname;

      const removeBtn = document.createElement('div');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.title = 'Remove';
      removeBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        shortcuts = shortcuts.filter(s => s.id !== sc.id);
        saveShortcuts();
        renderShortcuts();
      });

      const editBtn = document.createElement('div');
      editBtn.className = 'edit-btn';
      editBtn.innerHTML = '&#9998;';
      editBtn.title = 'Edit';
      editBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        openModal(sc);
      });

      tile.appendChild(removeBtn);
      tile.appendChild(editBtn);
      tile.appendChild(iconBox);
      tile.appendChild(label);

      tile.addEventListener('click', ()=>{ window.location.href = sc.url; });

      tile.addEventListener('dragstart', ()=>{
        dragSrcId = sc.id;
        tile.classList.add('dragging');
      });
      tile.addEventListener('dragend', ()=>{ tile.classList.remove('dragging'); });
      tile.addEventListener('dragover', (e)=> e.preventDefault());
      tile.addEventListener('drop', (e)=>{
        e.preventDefault();
        if(!dragSrcId || dragSrcId === sc.id) return;
        const fromIdx = shortcuts.findIndex(s => s.id === dragSrcId);
        const toIdx = shortcuts.findIndex(s => s.id === sc.id);
        const [moved] = shortcuts.splice(fromIdx, 1);
        shortcuts.splice(toIdx, 0, moved);
        saveShortcuts();
        renderShortcuts();
      });

      shortcutsEl.appendChild(tile);
    });

    // add-tile
    const addTile = document.createElement('div');
    addTile.className = 'tile add-tile';
    addTile.innerHTML = `
      <div class="icon-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="label">Add</div>
    `;
    addTile.addEventListener('click', ()=> openModal());
    shortcutsEl.appendChild(addTile);
  }

  // ---------- Modal ----------
  function renderIconPreview(src){
    iconPreview.innerHTML = '';
    if(src){
      const img = document.createElement('img');
      img.src = src;
      iconPreview.appendChild(img);
      useDefaultIconBtn.style.display = 'block';
    } else {
      iconPreview.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
      useDefaultIconBtn.style.display = 'none';
    }
  }

  function openModal(existing){
    if(existing){
      editingId = existing.id;
      inputUrl.value = existing.url;
      inputName.value = existing.name || '';
      customIconData = existing.icon || null;
      modalTitle.textContent = 'Edit shortcut';
      saveBtn.textContent = 'Save';
    } else {
      editingId = null;
      inputUrl.value = '';
      inputName.value = '';
      customIconData = null;
      modalTitle.textContent = 'Add shortcut';
      saveBtn.textContent = 'Add';
    }
    renderIconPreview(customIconData);
    modalOverlay.classList.add('open');
    setTimeout(()=> inputUrl.focus(), 50);
  }
  function closeModal(){ modalOverlay.classList.remove('open'); }

  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e)=>{ if(e.target === modalOverlay) closeModal(); });

  uploadIconBtn.addEventListener('click', ()=> iconFileInput.click());
  useDefaultIconBtn.addEventListener('click', ()=>{
    customIconData = null;
    renderIconPreview(null);
  });
  iconFileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ showHint('Please choose an image file'); return; }
    const reader = new FileReader();
    reader.onload = function(ev){
      customIconData = ev.target.result;
      renderIconPreview(customIconData);
    };
    reader.onerror = function(){ showHint('Could not read image'); };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  saveBtn.addEventListener('click', addShortcutFromModal);
  inputUrl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') addShortcutFromModal(); });
  inputName.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') addShortcutFromModal(); });

  function addShortcutFromModal(){
    const raw = inputUrl.value.trim();
    if(!raw){ showHint('Enter a website URL'); return; }
    const url = normalizeUrl(raw);
    const hostname = getHostname(url);
    const name = inputName.value.trim() || hostname;

    if(editingId){
      const idx = shortcuts.findIndex(s => s.id === editingId);
      if(idx !== -1){
        shortcuts[idx] = { id: editingId, url, name, icon: customIconData || undefined };
      }
    } else {
      shortcuts.push({ id: 's' + Date.now(), url, name, icon: customIconData || undefined });
    }
    saveShortcuts();
    renderShortcuts();
    closeModal();
  }

  // ---------- Search ----------
  document.getElementById('search-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    const q = document.getElementById('search-input').value.trim();
    if(!q) return;
    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
  });

  // ---------- Init ----------
  loadShortcuts();
  renderShortcuts();
  loadBackground();
})();
</script>

</body>
</html>
