<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --glass: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.22);
    --glass-strong: rgba(255,255,255,0.16);
    --text: #f5f6f7;
    --text-dim: rgba(245,246,247,0.62);
    --accent: #ffb454;
    --danger: #ff5c5c;
    --radius: 18px;
    --blur: 22px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%; width:100%;
    font-family:'Inter', -apple-system, system-ui, sans-serif;
    overflow:hidden;
  }

  body{
    color: var(--text);
    background: #0e0f11;
  }

  /* ---------- Background layer ---------- */
  #bg-layer{
    position:fixed; inset:0; z-index:0;
    background: radial-gradient(ellipse at top, #1c2027 0%, #0b0c0e 70%);
  }
  #bg-image, #bg-video{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:none;
  }
  #bg-overlay{
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.18) 40%, rgba(0,0,0,0.40) 100%);
    pointer-events:none;
  }

  /* ---------- Main layout ---------- */
  #stage{
    position:relative; z-index:1;
    height:100vh; width:100vw;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 6vh 5vw;
    gap: 6vh;
  }

  /* ---------- Clock ---------- */
  #clock-wrap{
    text-align:center;
    user-select:none;
  }
  #clock{
    font-family:'Space Grotesk', sans-serif;
    font-weight:300;
    font-size: clamp(56px, 11vw, 132px);
    letter-spacing: 0.01em;
    line-height:1;
    text-shadow: 0 2px 30px rgba(0,0,0,0.35);
    font-variant-numeric: tabular-nums;
  }
  #clock .secs{
    font-size: 0.38em;
    color: var(--text-dim);
    vertical-align: 0.42em;
    margin-left: 6px;
  }
  #date{
    margin-top: 10px;
    font-size: clamp(13px, 1.6vw, 17px);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ---------- Search ---------- */
  #search-form{
    width: min(560px, 88vw);
  }
  #search-box{
    display:flex; align-items:center; gap:12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-radius: 999px;
    padding: 14px 20px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  #search-box:focus-within{
    background: var(--glass-strong);
    border-color: rgba(255,255,255,0.34);
  }
  #search-box svg{ flex-shrink:0; opacity:0.7; }
  #search-input{
    flex:1; background:none; border:none; outline:none;
    color: var(--text); font-size:15px; font-family:'Inter', sans-serif;
  }
  #search-input::placeholder{ color: var(--text-dim); }

  /* ---------- Shortcuts ---------- */
  #shortcuts{
    display:flex; flex-wrap:wrap; justify-content:center;
    gap: 22px 20px;
    width: min(680px, 92vw);
  }
  .tile{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    gap:8px; width: 76px;
    cursor:pointer;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .tile .icon-box{
    width:56px; height:56px; border-radius:16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    display:flex; align-items:center; justify-content:center;
    transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    overflow:hidden;
  }
  .tile:hover .icon-box{
    background: var(--glass-strong);
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.34);
  }
  .tile .icon-box img{ width:28px; height:28px; border-radius:6px; }
  .tile .fallback-letter{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px; font-weight:500; color: var(--text);
  }
  .tile .label{
    font-size:12px; color: var(--text-dim);
    max-width: 76px; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .tile .remove-btn, .tile .edit-btn{
    position:absolute; top:-6px;
    width:20px; height:20px; border-radius:50%;
    color:#fff;
    display:none; align-items:center; justify-content:center;
    font-size:11px; line-height:1; border:2px solid #0e0f11;
    cursor:pointer; z-index:2;
  }
  .tile .remove-btn{ right:8px; background: var(--danger); }
  .tile .edit-btn{ left:8px; background: #4d84ff; font-size:12px; }
  .tile:hover .remove-btn, .tile:hover .edit-btn{ display:flex; }
  .tile.dragging{ opacity:0.4; }

  .tile.add-tile .icon-box{
    border-style:dashed;
    background: rgba(255,255,255,0.04);
  }
  .tile.add-tile .icon-box svg{ opacity:0.75; }
  .tile.add-tile .label{ opacity:0.75; }

  /* ---------- Bottom-right controls ---------- */
  #controls{
    position:fixed; bottom:22px; right:22px; z-index:3;
    display:flex; gap:10px;
  }
  .ctrl-btn{
    width:42px; height:42px; border-radius:50%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    display:flex; align-items:center; justify-content:center;
    color: var(--text); cursor:pointer;
    transition: background 0.18s ease, transform 0.18s ease;
  }
  .ctrl-btn:hover{ background: var(--glass-strong); transform: translateY(-2px); }

  /* ---------- Settings modal extras ---------- */
  .settings-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .settings-row:last-of-type{ border-bottom:none; }
  .settings-row .settings-label{ font-size:14px; }
  .settings-row .settings-sub{ font-size:12px; color: var(--text-dim); margin-top:2px; }
  .segmented{
    display:flex; background: rgba(255,255,255,0.06);
    border:1px solid var(--glass-border); border-radius:9px; overflow:hidden;
  }
  .segmented button{
    border:none; background:none; color: var(--text-dim);
    font-size:13px; padding:7px 13px; cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .segmented button.active{ background: var(--accent); color:#1a1305; }
  .switch{
    position:relative; width:42px; height:24px; flex-shrink:0;
  }
  .switch input{ opacity:0; width:0; height:0; }
  .switch .track{
    position:absolute; inset:0; border-radius:999px; cursor:pointer;
    background: rgba(255,255,255,0.18); transition: background 0.18s ease;
  }
  .switch .track::before{
    content:''; position:absolute; width:18px; height:18px; border-radius:50%;
    background:#fff; top:3px; left:3px; transition: transform 0.18s ease;
  }
  .switch input:checked + .track{ background: var(--accent); }
  .switch input:checked + .track::before{ transform: translateX(18px); }

  /* ---------- Calendar popover ---------- */
  #calendar-popover{
    position:absolute; top: calc(100% + 12px); left:50%; transform: translateX(-50%);
    width:270px; z-index:5;
    background: rgba(28,30,34,0.92);
    border:1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    padding:16px;
    display:none;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }
  #calendar-popover.open{ display:block; }
  #clock-wrap{ position:relative; }
  #date{ cursor:pointer; }
  .cal-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .cal-header .cal-title{ font-size:14px; font-weight:500; }
  .cal-nav-btn{
    width:26px; height:26px; border-radius:7px; border:none;
    background: rgba(255,255,255,0.08); color: var(--text);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .cal-nav-btn:hover{ background: rgba(255,255,255,0.16); }
  .cal-grid{
    display:grid; grid-template-columns: repeat(7, 1fr);
    gap:4px; text-align:center;
  }
  .cal-grid .cal-dow{
    font-size:10px; color: var(--text-dim); padding-bottom:4px;
    text-transform:uppercase;
  }
  .cal-grid .cal-day{
    font-size:12.5px; padding:6px 0; border-radius:7px; color: var(--text);
  }
  .cal-grid .cal-day.other-month{ color: rgba(255,255,255,0.25); }
  .cal-grid .cal-day.today{
    background: var(--accent); color:#1a1305; font-weight:600;
  }

  /* ---------- Pomodoro widget ---------- */
  #pomodoro-widget{
    position:fixed; bottom:22px; left:22px; z-index:3;
    width:200px;
    background: var(--glass);
    border:1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    padding:16px;
    display:none;
  }
  #pomodoro-widget.visible{ display:block; }
  .pomo-tabs{
    display:flex; gap:6px; margin-bottom:12px;
  }
  .pomo-tabs button{
    flex:1; border:none; background: rgba(255,255,255,0.06);
    color: var(--text-dim); font-size:10.5px; padding:6px 4px;
    border-radius:7px; cursor:pointer; font-family:'Inter', sans-serif;
  }
  .pomo-tabs button.active{ background: rgba(255,255,255,0.16); color: var(--text); }
  .pomo-time{
    font-family:'Space Grotesk', sans-serif; font-weight:400;
    font-size:38px; text-align:center; letter-spacing:0.02em;
    font-variant-numeric: tabular-nums; margin-bottom:12px;
  }
  .pomo-controls{ display:flex; gap:8px; }
  .pomo-controls button{
    flex:1; border:none; border-radius:9px; padding:9px 0;
    font-size:13px; font-weight:500; cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .pomo-start-btn{ background: var(--accent); color:#1a1305; }
  .pomo-reset-btn{ background: rgba(255,255,255,0.08); color: var(--text); }
  .pomo-controls button:hover{ opacity:0.88; }

  /* ---------- Modal ---------- */
  #modal-overlay, .modal-overlay-base{
    position:fixed; inset:0; z-index:10;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    display:none; align-items:center; justify-content:center;
  }
  #modal-overlay.open, .modal-overlay-base.open{ display:flex; }
  .modal{
    width: min(360px, 88vw);
    background: rgba(28,30,34,0.86);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .modal h3{
    margin:0 0 18px; font-family:'Space Grotesk', sans-serif;
    font-weight:500; font-size:19px;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; color: var(--text-dim);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;
  }
  .field input{
    width:100%; padding:11px 13px; border-radius:10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text); font-size:14px; outline:none;
    font-family:'Inter', sans-serif;
  }
  .field input:focus{ border-color: var(--accent); }
  .icon-upload-row{
    display:flex; align-items:center; gap:12px;
  }
  .icon-preview{
    width:44px; height:44px; border-radius:12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; flex-shrink:0;
  }
  .icon-preview img{ width:26px; height:26px; border-radius:6px; }
  .icon-preview svg{ opacity:0.5; }
  .icon-upload-buttons{
    display:flex; flex-direction:column; gap:6px; flex:1;
  }
  .link-btn{
    background:none; border:none; color: var(--text-dim);
    font-size:12px; text-align:left; cursor:pointer; padding:0;
    font-family:'Inter', sans-serif; text-decoration:underline;
  }
  .link-btn:hover{ color: var(--text); }
  .upload-icon-btn{
    background: rgba(255,255,255,0.08); color: var(--text);
    border:1px solid var(--glass-border); border-radius:8px;
    padding:8px 12px; font-size:13px; cursor:pointer; text-align:left;
    font-family:'Inter', sans-serif;
  }
  .upload-icon-btn:hover{ background: rgba(255,255,255,0.14); }
  .modal-actions{
    display:flex; gap:10px; margin-top:20px;
  }
  .btn{
    flex:1; padding:11px; border-radius:10px; border:none;
    font-size:14px; font-weight:500; cursor:pointer;
    font-family:'Inter', sans-serif;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--accent); color:#1a1305; }
  .btn-secondary{ background: rgba(255,255,255,0.08); color: var(--text); }
  .btn:hover{ opacity:0.9; }

  #file-input, #bg-file-input{ display:none; }

  #hint{
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    z-index:20; background: rgba(20,20,22,0.85);
    border:1px solid var(--glass-border); border-radius:10px;
    padding:9px 16px; font-size:13px; color: var(--text);
    opacity:0; pointer-events:none; transition: opacity 0.3s ease;
  }
  #hint.show{ opacity:1; }
</style>
</head>
<body>

<div id="bg-layer">
  <img id="bg-image" alt="">
  <video id="bg-video" autoplay muted loop playsinline></video>
  <div id="bg-overlay"></div>
</div>

<div id="hint"></div>

<div id="stage">
  <div id="clock-wrap">
    <div id="clock">00:00<span class="secs">00</span></div>
    <div id="date">—</div>
    <div id="calendar-popover">
      <div class="cal-header">
        <button class="cal-nav-btn" id="cal-prev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="cal-title" id="cal-title">—</div>
        <button class="cal-nav-btn" id="cal-next">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <form id="search-form">
    <div id="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search the web" autocomplete="off">
    </div>
  </form>

  <div id="shortcuts"></div>
</div>

<div id="controls">
  <div class="ctrl-btn" id="settings-btn" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </div>
  <div class="ctrl-btn" id="bg-btn" title="Change background">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
  </div>
  <div class="ctrl-btn" id="bg-clear-btn" title="Remove background">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
  </div>
</div>

<div id="pomodoro-widget">
  <div class="pomo-tabs">
    <button class="pomo-tab active" data-mode="work">Focus</button>
    <button class="pomo-tab" data-mode="short">Short</button>
    <button class="pomo-tab" data-mode="long">Long</button>
  </div>
  <div class="pomo-time" id="pomo-time">25:00</div>
  <div class="pomo-controls">
    <button class="pomo-start-btn" id="pomo-start">Start</button>
    <button class="pomo-reset-btn" id="pomo-reset">Reset</button>
  </div>
</div>

<div id="settings-overlay" class="modal-overlay-base">
  <div class="modal">
    <h3>Settings</h3>
    <div class="settings-row">
      <div>
        <div class="settings-label">Clock format</div>
      </div>
      <div class="segmented" id="clock-format-toggle">
        <button data-format="24" class="active">24h</button>
        <button data-format="12">12h</button>
      </div>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">Pomodoro widget</div>
        <div class="settings-sub">Show a focus timer on the homepage</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="pomodoro-toggle">
        <span class="track"></span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="settings-close-btn">Done</button>
    </div>
  </div>
</div>

<input type="file" id="bg-file-input" accept="image/*,video/*">

<div id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add shortcut</h3>
    <div class="field">
      <label>Website URL</label>
      <input id="input-url" type="text" placeholder="youtube.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Name (optional)</label>
      <input id="input-name" type="text" placeholder="YouTube" autocomplete="off">
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="icon-upload-row">
        <div class="icon-preview" id="icon-preview">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="icon-upload-buttons">
          <button type="button" class="upload-icon-btn" id="upload-icon-btn">Upload custom icon</button>
          <button type="button" class="link-btn" id="use-default-icon-btn" style="display:none;">Use site's default icon instead</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Add</button>
    </div>
  </div>
</div>

<input type="file" id="icon-file-input" accept="image/*">

<script>
(function(){
  const STORAGE_KEY = 'homepage.shortcuts.v1';
  const BG_KEY = 'homepage.background.v1';
  const SETTINGS_KEY = 'homepage.settings.v1';

  const shortcutsEl = document.getElementById('shortcuts');
  const modalOverlay = document.getElementById('modal-overlay');
  const modalTitle = document.getElementById('modal-title');
  const inputUrl = document.getElementById('input-url');
  const inputName = document.getElementById('input-name');
  const bgImage = document.getElementById('bg-image');
  const bgVideo = document.getElementById('bg-video');
  const hint = document.getElementById('hint');
  const iconPreview = document.getElementById('icon-preview');
  const iconFileInput = document.getElementById('icon-file-input');
  const uploadIconBtn = document.getElementById('upload-icon-btn');
  const useDefaultIconBtn = document.getElementById('use-default-icon-btn');
  const saveBtn = document.getElementById('save-btn');
  const settingsOverlay = document.getElementById('settings-overlay');
  const dateEl = document.getElementById('date');
  const calendarPopover = document.getElementById('calendar-popover');
  const pomodoroWidget = document.getElementById('pomodoro-widget');

  let shortcuts = [];
  let dragSrcId = null;
  let editingId = null;      // null = adding new, otherwise id of shortcut being edited
  let customIconData = null; // base64 data URL of uploaded custom icon, or null
  let settings = { clockFormat: '24', showPomodoro: false };
  loadSettings();

  // ---------- Defaults ----------
  const defaultShortcuts = [
    { id: 'd1', url: 'https://youtube.com', name: 'YouTube' },
    { id: 'd2', url: 'https://github.com', name: 'GitHub' },
    { id: 'd3', url: 'https://mail.google.com', name: 'Gmail' }
  ];

  // ---------- Storage ----------
  function loadShortcuts(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      shortcuts = raw ? JSON.parse(raw) : defaultShortcuts.slice();
    }catch(e){
      shortcuts = defaultShortcuts.slice();
    }
  }
  function saveShortcuts(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(shortcuts)); }
    catch(e){ showHint('Could not save shortcuts'); }
  }

  function loadSettings(){
    try{
      const raw = localStorage.getItem(SETTINGS_KEY);
      if(raw) settings = Object.assign(settings, JSON.parse(raw));
    }catch(e){ /* keep defaults */ }
  }
  function saveSettings(){
    try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
    catch(e){ showHint('Could not save settings'); }
  }

  function loadBackground(){
    try{
      const raw = localStorage.getItem(BG_KEY);
      if(!raw) return;
      const data = JSON.parse(raw);
      applyBackground(data.type, data.src, false);
    }catch(e){ /* ignore */ }
  }
  function saveBackground(type, src){
    try{
      localStorage.setItem(BG_KEY, JSON.stringify({ type, src }));
    }catch(e){
      showHint('Background too large to save — it will reset next time');
    }
  }
  function clearBackgroundStorage(){
    try{ localStorage.removeItem(BG_KEY); }catch(e){}
  }

  function showHint(msg){
    hint.textContent = msg;
    hint.classList.add('show');
    clearTimeout(showHint._t);
    showHint._t = setTimeout(()=> hint.classList.remove('show'), 2400);
  }

  // ---------- Background ----------
  function applyBackground(type, src, persist){
    if(type === 'image'){
      bgVideo.pause();
      bgVideo.style.display = 'none';
      bgVideo.removeAttribute('src');
      bgImage.src = src;
      bgImage.style.display = 'block';
    } else if(type === 'video'){
      bgImage.style.display = 'none';
      bgImage.removeAttribute('src');
      bgVideo.src = src;
      bgVideo.style.display = 'block';
      bgVideo.play().catch(()=>{});
    }
    if(persist) saveBackground(type, src);
  }

  function clearBackground(){
    bgImage.style.display = 'none';
    bgImage.removeAttribute('src');
    bgVideo.pause();
    bgVideo.style.display = 'none';
    bgVideo.removeAttribute('src');
    clearBackgroundStorage();
    showHint('Background removed');
  }

  document.getElementById('bg-btn').addEventListener('click', ()=>{
    document.getElementById('bg-file-input').click();
  });
  document.getElementById('bg-clear-btn').addEventListener('click', clearBackground);

  document.getElementById('bg-file-input').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const isVideo = file.type.startsWith('video/');
    const isImage = file.type.startsWith('image/');
    if(!isVideo && !isImage){ showHint('Unsupported file type'); return; }

    const reader = new FileReader();
    reader.onload = function(ev){
      applyBackground(isVideo ? 'video' : 'image', ev.target.result, true);
    };
    reader.onerror = function(){ showHint('Could not read file'); };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // ---------- Clock ----------
  function pad(n){ return n.toString().padStart(2, '0'); }
  function tickClock(){
    const now = new Date();
    let h = now.getHours();
    const m = pad(now.getMinutes());
    const s = pad(now.getSeconds());
    let hourStr, suffix = '';
    if(settings.clockFormat === '12'){
      suffix = h >= 12 ? ' PM' : ' AM';
      let h12 = h % 12;
      if(h12 === 0) h12 = 12;
      hourStr = h12.toString();
    } else {
      hourStr = pad(h);
    }
    document.getElementById('clock').innerHTML = hourStr + ':' + m + '<span class="secs">' + s + suffix + '</span>';
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    dateEl.textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------- Calendar popover ----------
  let calViewDate = new Date();
  function renderCalendar(){
    const year = calViewDate.getFullYear();
    const month = calViewDate.getMonth();
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('cal-title').textContent = months[month] + ' ' + year;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    ['S','M','T','W','T','F','S'].forEach(d=>{
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();
    const today = new Date();

    for(let i = firstDay - 1; i >= 0; i--){
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.textContent = daysInPrevMonth - i;
      grid.appendChild(el);
    }
    for(let d = 1; d <= daysInMonth; d++){
      const el = document.createElement('div');
      el.className = 'cal-day';
      if(d === today.getDate() && month === today.getMonth() && year === today.getFullYear()){
        el.classList.add('today');
      }
      el.textContent = d;
      grid.appendChild(el);
    }
    const totalCells = firstDay + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for(let d = 1; d <= trailing; d++){
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.textContent = d;
      grid.appendChild(el);
    }
  }

  dateEl.addEventListener('click', (e)=>{
    e.stopPropagation();
    const isOpen = calendarPopover.classList.contains('open');
    if(isOpen){
      calendarPopover.classList.remove('open');
    } else {
      calViewDate = new Date();
      renderCalendar();
      calendarPopover.classList.add('open');
    }
  });
  document.getElementById('cal-prev').addEventListener('click', (e)=>{
    e.stopPropagation();
    calViewDate.setMonth(calViewDate.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', (e)=>{
    e.stopPropagation();
    calViewDate.setMonth(calViewDate.getMonth() + 1);
    renderCalendar();
  });
  document.addEventListener('click', (e)=>{
    if(!calendarPopover.contains(e.target) && e.target !== dateEl){
      calendarPopover.classList.remove('open');
    }
  });

  // ---------- Settings ----------
  function applyClockFormatUI(){
    document.querySelectorAll('#clock-format-toggle button').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.format === settings.clockFormat);
    });
  }
  function applyPomodoroVisibility(){
    pomodoroWidget.classList.toggle('visible', settings.showPomodoro);
    document.getElementById('pomodoro-toggle').checked = settings.showPomodoro;
  }

  document.getElementById('settings-btn').addEventListener('click', ()=>{
    applyClockFormatUI();
    applyPomodoroVisibility();
    settingsOverlay.classList.add('open');
  });
  document.getElementById('settings-close-btn').addEventListener('click', ()=>{
    settingsOverlay.classList.remove('open');
  });
  settingsOverlay.addEventListener('click', (e)=>{
    if(e.target === settingsOverlay) settingsOverlay.classList.remove('open');
  });
  document.querySelectorAll('#clock-format-toggle button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      settings.clockFormat = btn.dataset.format;
      applyClockFormatUI();
      saveSettings();
      tickClock();
    });
  });
  document.getElementById('pomodoro-toggle').addEventListener('change', (e)=>{
    settings.showPomodoro = e.target.checked;
    applyPomodoroVisibility();
    saveSettings();
  });

  // ---------- Pomodoro widget ----------
  const pomoDurations = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
  let pomoMode = 'work';
  let pomoSecondsLeft = pomoDurations.work;
  let pomoTimer = null;
  let pomoRunning = false;

  function pomoFormat(s){
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return pad(m) + ':' + pad(sec);
  }
  function renderPomo(){
    document.getElementById('pomo-time').textContent = pomoFormat(pomoSecondsLeft);
    document.getElementById('pomo-start').textContent = pomoRunning ? 'Pause' : 'Start';
  }
  function pomoSwitchMode(mode){
    pomoMode = mode;
    pomoSecondsLeft = pomoDurations[mode];
    pomoRunning = false;
    clearInterval(pomoTimer);
    document.querySelectorAll('.pomo-tab').forEach(t=> t.classList.toggle('active', t.dataset.mode === mode));
    renderPomo();
  }
  document.querySelectorAll('.pomo-tab').forEach(tab=>{
    tab.addEventListener('click', ()=> pomoSwitchMode(tab.dataset.mode));
  });
  document.getElementById('pomo-start').addEventListener('click', ()=>{
    if(pomoRunning){
      pomoRunning = false;
      clearInterval(pomoTimer);
      renderPomo();
      return;
    }
    pomoRunning = true;
    renderPomo();
    pomoTimer = setInterval(()=>{
      pomoSecondsLeft--;
      if(pomoSecondsLeft <= 0){
        clearInterval(pomoTimer);
        pomoRunning = false;
        pomoSecondsLeft = 0;
        renderPomo();
        showHint(pomoMode === 'work' ? 'Focus session complete — take a break' : 'Break complete — back to focus');
        return;
      }
      renderPomo();
    }, 1000);
  });
  document.getElementById('pomo-reset').addEventListener('click', ()=>{
    pomoRunning = false;
    clearInterval(pomoTimer);
    pomoSecondsLeft = pomoDurations[pomoMode];
    renderPomo();
  });
  renderPomo();

  // ---------- Shortcuts rendering ----------
  function normalizeUrl(raw){
    let u = raw.trim();
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }
  function getHostname(url){
    try{ return new URL(url).hostname.replace(/^www\./, ''); }
    catch(e){ return url; }
  }
  function faviconUrl(hostname){
    return 'https://www.google.com/s2/favicons?sz=128&domain=' + encodeURIComponent(hostname);
  }

  function renderShortcuts(){
    shortcutsEl.innerHTML = '';
    shortcuts.forEach(sc => {
      const hostname = getHostname(sc.url);
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.draggable = true;
      tile.dataset.id = sc.id;

      const iconBox = document.createElement('div');
      iconBox.className = 'icon-box';
      const img = document.createElement('img');
      img.src = sc.icon || faviconUrl(hostname);
      img.alt = '';
      img.onerror = function(){
        iconBox.innerHTML = '';
        const letter = document.createElement('div');
        letter.className = 'fallback-letter';
        letter.textContent = (sc.name || hostname).charAt(0).toUpperCase();
        iconBox.appendChild(letter);
      };
      iconBox.appendChild(img);

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = sc.name || hostname;

      const removeBtn = document.createElement('div');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.title = 'Remove';
      removeBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        shortcuts = shortcuts.filter(s => s.id !== sc.id);
        saveShortcuts();
        renderShortcuts();
      });

      const editBtn = document.createElement('div');
      editBtn.className = 'edit-btn';
      editBtn.innerHTML = '&#9998;';
      editBtn.title = 'Edit';
      editBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        openModal(sc);
      });

      tile.appendChild(removeBtn);
      tile.appendChild(editBtn);
      tile.appendChild(iconBox);
      tile.appendChild(label);

      tile.addEventListener('click', ()=>{ window.location.href = sc.url; });

      tile.addEventListener('dragstart', ()=>{
        dragSrcId = sc.id;
        tile.classList.add('dragging');
      });
      tile.addEventListener('dragend', ()=>{ tile.classList.remove('dragging'); });
      tile.addEventListener('dragover', (e)=> e.preventDefault());
      tile.addEventListener('drop', (e)=>{
        e.preventDefault();
        if(!dragSrcId || dragSrcId === sc.id) return;
        const fromIdx = shortcuts.findIndex(s => s.id === dragSrcId);
        const toIdx = shortcuts.findIndex(s => s.id === sc.id);
        const [moved] = shortcuts.splice(fromIdx, 1);
        shortcuts.splice(toIdx, 0, moved);
        saveShortcuts();
        renderShortcuts();
      });

      shortcutsEl.appendChild(tile);
    });

    // add-tile
    const addTile = document.createElement('div');
    addTile.className = 'tile add-tile';
    addTile.innerHTML = `
      <div class="icon-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="label">Add</div>
    `;
    addTile.addEventListener('click', ()=> openModal());
    shortcutsEl.appendChild(addTile);
  }

  // ---------- Modal ----------
  function renderIconPreview(src){
    iconPreview.innerHTML = '';
    if(src){
      const img = document.createElement('img');
      img.src = src;
      iconPreview.appendChild(img);
      useDefaultIconBtn.style.display = 'block';
    } else {
      iconPreview.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
      useDefaultIconBtn.style.display = 'none';
    }
  }

  function openModal(existing){
    if(existing){
      editingId = existing.id;
      inputUrl.value = existing.url;
      inputName.value = existing.name || '';
      customIconData = existing.icon || null;
      modalTitle.textContent = 'Edit shortcut';
      saveBtn.textContent = 'Save';
    } else {
      editingId = null;
      inputUrl.value = '';
      inputName.value = '';
      customIconData = null;
      modalTitle.textContent = 'Add shortcut';
      saveBtn.textContent = 'Add';
    }
    renderIconPreview(customIconData);
    modalOverlay.classList.add('open');
    setTimeout(()=> inputUrl.focus(), 50);
  }
  function closeModal(){ modalOverlay.classList.remove('open'); }

  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e)=>{ if(e.target === modalOverlay) closeModal(); });

  uploadIconBtn.addEventListener('click', ()=> iconFileInput.click());
  useDefaultIconBtn.addEventListener('click', ()=>{
    customIconData = null;
    renderIconPreview(null);
  });
  iconFileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ showHint('Please choose an image file'); return; }
    const reader = new FileReader();
    reader.onload = function(ev){
      customIconData = ev.target.result;
      renderIconPreview(customIconData);
    };
    reader.onerror = function(){ showHint('Could not read image'); };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  saveBtn.addEventListener('click', addShortcutFromModal);
  inputUrl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') addShortcutFromModal(); });
  inputName.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') addShortcutFromModal(); });

  function addShortcutFromModal(){
    const raw = inputUrl.value.trim();
    if(!raw){ showHint('Enter a website URL'); return; }
    const url = normalizeUrl(raw);
    const hostname = getHostname(url);
    const name = inputName.value.trim() || hostname;

    if(editingId){
      const idx = shortcuts.findIndex(s => s.id === editingId);
      if(idx !== -1){
        shortcuts[idx] = { id: editingId, url, name, icon: customIconData || undefined };
      }
    } else {
      shortcuts.push({ id: 's' + Date.now(), url, name, icon: customIconData || undefined });
    }
    saveShortcuts();
    renderShortcuts();
    closeModal();
  }

  // ---------- Search ----------
  document.getElementById('search-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    const q = document.getElementById('search-input').value.trim();
    if(!q) return;
    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
  });

  // ---------- Init ----------
  loadShortcuts();
  renderShortcuts();
  loadBackground();
  loadSettings();
  applyClockFormatUI();
  applyPomodoroVisibility();
})();
</script>

</body>
</html>
